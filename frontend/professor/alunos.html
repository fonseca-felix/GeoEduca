<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoEduca - Alunos</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/darkmode.css" />
  <style>
    .table-container { background: var(--bg-surface, #ffffff); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid var(--border-color, #e5e7eb); }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border-color, #f3f4f6); }
    th { background: var(--bg-muted, #f9fafb); font-weight: 600; color: var(--text-muted, #6b7280); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: var(--bg-muted, #f9fafb); }
    .badge { padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.025em; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .badge-attention { background: #fef3c7; color: #92400e; }
    .actions { display: flex; gap: 0.5rem; }
    .btn-icon { padding: 0.5rem; border-radius: 6px; border: none; background: transparent; cursor: pointer; transition: background 0.2s; color: var(--text-muted, #6b7280); }
    .btn-icon:hover { background: var(--bg-muted, #f3f4f6); color: var(--color-primary, #3b82f6); }
    .btn-icon.danger:hover { color: #ef4444; }
    .search-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-input-wrapper { flex: 1; min-width: 250px; position: relative; }
    .search-input-wrapper input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--border-color, #e5e7eb); border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .search-input-wrapper input:focus { border-color: var(--color-primary, #3b82f6); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .search-input-wrapper svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted, #9ca3af); }
    .filter-select { padding: 0.75rem 1rem; border: 1px solid var(--border-color, #e5e7eb); border-radius: 8px; font-family: 'Inter', sans-serif; background: #fff; min-width: 200px; outline: none; }
    
    /* Modal Styles */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 100; opacity: 0; transition: opacity 0.3s; }
    .modal-overlay.open { display: flex; opacity: 1; }
    .modal-overlay .modal-content { background: var(--bg-surface, #ffffff); padding: 2rem; border-radius: 16px; width: 100%; max-width: 500px; position: relative; transform: translateY(20px); transition: transform 0.3s; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal-overlay.open .modal-content { transform: translateY(0); }
    .modal-header { margin-bottom: 1.5rem; }
    .modal-title { font-size: 1.5rem; font-weight: 600; color: var(--text-primary, #111827); font-family: 'Space Grotesk', sans-serif; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; color: var(--text-primary, #374151); }
    .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid #d1d5db; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; }
    .form-control:focus { border-color: var(--color-primary, #3b82f6); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <main class="app-main">
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Alunos</h1>
        <p class="page-subtitle">Gerencie os alunos matriculados nas suas salas.</p>
      </div>
      <div class="page-header-right">
        <button class="btn btn-primary" onclick="Modal.open('addStudentModal')">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 8px; vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Adicionar Aluno
        </button>
      </div>
    </header>
    <div class="page-content">
      
      <div class="search-bar">
        <div class="search-input-wrapper">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="text" id="searchInput" placeholder="Buscar aluno por nome ou matrícula..." />
        </div>
        <select id="filterRoom" class="filter-select">
          <option value="">Todas as Salas</option>
          <!-- Injected via JS -->
        </select>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Aluno</th>
              <th>RM</th>
              <th>Sala</th>
              <th>Progresso</th>
              <th>Status</th>
              <th style="text-align: right;">Ações</th>
            </tr>
          </thead>
          <tbody id="students-table-body">
            <!-- JS populated -->
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal Adicionar Aluno -->
<div id="addStudentModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Adicionar Novo Aluno</h2>
      <p style="color: var(--text-muted, #6b7280); font-size: 0.875rem; margin-top: 0.25rem;">Insira os dados para vincular o aluno à sala.</p>
    </div>
    <form id="addStudentForm">
      <div class="form-group">
        <label class="form-label">Nome Completo</label>
        <input type="text" id="studentName" class="form-control" required placeholder="Ex: João da Silva" />
      </div>
      <div class="form-group">
        <label class="form-label">RM (4 números)</label>
        <input type="text" id="studentId" class="form-control" pattern="\d{4}" maxlength="4" minlength="4" required placeholder="Ex: 1234" title="O RM deve conter exatamente 4 números" />
      </div>
      <div class="form-group">
        <label class="form-label">Sala de Destino</label>
        <select id="studentRoom" class="form-control" required>
          <option value="" disabled selected>Selecione uma sala...</option>
          <!-- Injected via JS -->
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="Modal.close('addStudentModal')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Adicionar Aluno</button>
      </div>
    </form>
  </div>
</div>
<!-- Modal Editar Aluno -->
<div id="editStudentModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Editar Aluno</h2>
      <p style="color: var(--text-muted, #6b7280); font-size: 0.875rem; margin-top: 0.25rem;">Altere os dados do aluno ou mude sua senha.</p>
    </div>
    <form id="editStudentForm">
      <input type="hidden" id="editStudentIdDb" />
      <div class="form-group">
        <label class="form-label">Nome Completo</label>
        <input type="text" id="editStudentName" class="form-control" required />
      </div>
      <div class="form-group">
        <label class="form-label">RM (4 números)</label>
        <input type="text" id="editStudentRm" class="form-control" pattern="\d{4}" maxlength="4" minlength="4" required />
      </div>
      <div class="form-group">
        <label class="form-label">Sala</label>
        <select id="editStudentRoom" class="form-control" required>
          <option value="" disabled>Selecione uma sala...</option>
        </select>
      </div>
      <div class="form-group" style="padding: 1rem; background: #f3f4f6; border-radius: 8px;">
        <label class="form-label">Senha de Acesso (Login)</label>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <input type="text" id="editStudentPassword" class="form-control" style="font-family: monospace; font-size: 1.1rem; letter-spacing: 2px;" placeholder="Nova senha (opcional)" />
          <button type="button" class="btn btn-outline" onclick="copyPassword()" title="Copiar senha atual">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          </button>
        </div>
        <small style="color: #6b7280; display: block; margin-top: 0.5rem;">Para manter a mesma senha, deixe em branco ou não altere.</small>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="Modal.close('editStudentModal')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/professor/alunos.js"></script>
</body>
</html>
