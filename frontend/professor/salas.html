<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoEduca - Salas</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/darkmode.css" />
  <style>
    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .room-card { background: var(--bg-surface, #ffffff); border-radius: 12px; border: 1px solid var(--border-color, #e5e7eb); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; }
    .room-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .room-header { padding: 1.5rem; color: white; position: relative; }
    .room-title { font-size: 1.25rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; margin-bottom: 0.25rem; }
    .room-subtitle { font-size: 0.875rem; opacity: 0.9; font-weight: 500; }
    .room-body { padding: 1.5rem; flex: 1; }
    .room-stat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; font-size: 0.875rem; border-bottom: 1px solid #f3f4f6; padding-bottom: 0.75rem; }
    .room-stat:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .room-stat-label { color: var(--text-muted, #6b7280); display: flex; align-items: center; gap: 0.5rem; }
    .room-stat-value { font-weight: 600; color: var(--text-primary, #111827); }
    .room-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border-color, #e5e7eb); display: flex; justify-content: space-between; align-items: center; background: var(--bg-muted, #f9fafb); }
    .room-code { background: #e5e7eb; padding: 0.35rem 0.75rem; border-radius: 6px; font-family: monospace; font-weight: 700; letter-spacing: 1px; color: #374151; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s; }
    .room-code:hover { background: #d1d5db; }
    
    .search-bar { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .search-input-wrapper { flex: 1; position: relative; }
    .search-input-wrapper input { width: 100%; padding: 0.875rem 1rem 0.875rem 3rem; border: 1px solid var(--border-color, #e5e7eb); border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; font-size: 1rem; }
    .search-input-wrapper input:focus { border-color: var(--color-primary, #3b82f6); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .search-input-wrapper svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted, #9ca3af); width: 20px; height: 20px; }

    /* Modal Styles — usa modal-overlay + .open para casar com ui.js */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 100; opacity: 0; transition: opacity 0.3s; }
    .modal-overlay.open { display: flex; opacity: 1; }
    .modal-content { background: var(--bg-surface, #ffffff); padding: 2rem; border-radius: 16px; width: 100%; max-width: 500px; position: relative; transform: translateY(20px); transition: transform 0.3s; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal-overlay.open .modal-content { transform: translateY(0); }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; color: var(--text-primary, #374151); }
    .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid #d1d5db; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; }
    .form-control:focus { border-color: var(--color-primary, #3b82f6); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <main class="app-main">
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Salas e Turmas</h1>
        <p class="page-subtitle">Organize seus alunos e acompanhe o engajamento de cada turma.</p>
      </div>
      <div class="page-header-right">
        <button class="btn btn-primary" onclick="Modal.open('addRoomModal')">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 8px; vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Criar Sala
        </button>
      </div>
    </header>
    <div class="page-content">
      
      <div class="search-bar">
        <div class="search-input-wrapper">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="text" id="searchRoom" placeholder="Buscar sala por nome, assunto ou código..." />
        </div>
      </div>

      <div class="rooms-grid" id="rooms-container">
        <!-- populated by JS -->
      </div>
      
    </div>
  </main>
</div>

<!-- Modal Nova Sala — classe modal-overlay para casar com Modal.open() do ui.js -->
<div id="addRoomModal" class="modal-overlay">
  <div class="modal-content">
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; font-family: 'Space Grotesk', sans-serif;">Criar Nova Sala</h2>
    <p style="color: var(--text-muted, #6b7280); font-size: 0.875rem; margin-bottom: 1.5rem;">Preencha as informações da nova turma.</p>
    
    <form id="addRoomForm">
      <div class="form-group">
        <label class="form-label">Nome da Sala *</label>
        <input type="text" id="roomName" class="form-control" required placeholder="Ex: 6º Ano A" />
      </div>
      <div class="form-group">
        <label class="form-label">Série *</label>
        <input type="text" id="roomSerie" class="form-control" required placeholder="Ex: 6º Ano" />
      </div>
      <div class="form-group">
        <label class="form-label">Turma *</label>
        <input type="text" id="roomTurma" class="form-control" required placeholder="Ex: A" />
      </div>
      <div class="form-group">
        <label class="form-label">Assunto Principal</label>
        <input type="text" id="roomSubject" class="form-control" placeholder="Ex: Cartografia, Relevo, etc." />
      </div>
      <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
        <button type="button" class="btn btn-outline" onclick="Modal.close('addRoomModal')">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="saveRoomBtn">Criar Sala</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/professor/salas.js"></script>
</body>
</html>
