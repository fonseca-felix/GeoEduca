<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoEduca - Minhas Atividades</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/darkmode.css" />
  <style>
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.5rem 1.25rem; border-radius: 20px; border: 1px solid var(--border-color, #e2e8f0); background: var(--bg-card, #fff); color: var(--text-secondary, #64748b); cursor: pointer; transition: all 0.2s; font-weight: 500; font-family: 'Inter', sans-serif; }
    .filter-btn:hover { border-color: var(--primary-color, #4361ee); color: var(--primary-color, #4361ee); }
    .filter-btn.active { background: var(--primary-color, #4361ee); color: #fff; border-color: var(--primary-color, #4361ee); }
    
    .activities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .activity-card { background: var(--bg-card, #ffffff); border: 1px solid var(--border-color, #e2e8f0); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; transition: transform 0.2s, box-shadow 0.2s; }
    .activity-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    
    .activity-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .activity-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 600; color: var(--text-primary, #1e293b); margin-bottom: 0.25rem; }
    .activity-subject { font-size: 0.875rem; color: var(--text-secondary, #64748b); display: flex; align-items: center; gap: 0.5rem; }
    .subject-icon { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--primary-color, #4361ee); }
    
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge.pendente { background: #fef3c7; color: #d97706; }
    .badge.concluída { background: #d1fae5; color: #059669; }
    .badge.atrasada { background: #fee2e2; color: #dc2626; }
    
    .progress-section { margin: 0.5rem 0; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-secondary, #64748b); margin-bottom: 0.5rem; font-weight: 500; }
    .progress-track { height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary-color, #4361ee); border-radius: 4px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color, #e2e8f0); }
    .due-date { font-size: 0.875rem; color: var(--text-secondary, #64748b); display: flex; align-items: center; gap: 0.5rem; }
    
    .btn-action { background: var(--primary-color, #4361ee); color: white; border: none; padding: 0.6rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
    .btn-action:hover { background: var(--primary-hover, #3a56d4); transform: scale(1.02); }
    .btn-action.secondary { background: #f1f5f9; color: #475569; }
    .btn-action.secondary:hover { background: #e2e8f0; }

    /* Modal Styles */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: var(--bg-card, #fff); width: 90%; max-width: 500px; border-radius: 16px; padding: 2rem; transform: translateY(20px); transition: transform 0.3s; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary, #64748b); }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <main class="app-main">
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Minhas Atividades</h1>
        <p class="page-subtitle">Acompanhe suas tarefas e trilhas de aprendizado.</p>
      </div>
    </header>
    <div class="page-content">
      <div class="filter-bar" id="filter-bar">
        <!-- Filters injected via JS -->
      </div>
      <div class="activities-grid" id="activities-grid">
        <!-- Activities injected via JS -->
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="activity-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Detalhes da Atividade</h2>
      <button class="modal-close" onclick="closeModal('activity-modal')">&times;</button>
    </div>
    <div id="modal-body" style="color: var(--text-secondary, #64748b); margin-bottom: 2rem; line-height: 1.6;">
      <!-- Content -->
    </div>
    <div style="display: flex; gap: 1rem; justify-content: flex-end;">
      <button class="btn-action secondary" onclick="closeModal('activity-modal')">Cancelar</button>
      <button class="btn-action" id="modal-action-btn">Iniciar</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/aluno/atividades.js"></script>
</body>
</html>
