<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoEduca – Notificações</title>
  <meta name="description" content="Seus avisos, novas atividades e conquistas no GeoEduca." />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/darkmode.css" />

  <style>
    /* ── Notif Wrapper ───────────────────────────────────── */
    .notif-wrapper {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Top Bar: count + action ─────────────────────────── */
    .notif-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .notif-count-label {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notif-unread-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: var(--radius-full);
      background: var(--navy);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font-display);
    }

    /* ── Filter Tabs ─────────────────────────────────────── */
    .notif-tabs {
      display: flex;
      gap: 4px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 4px;
    }

    .notif-tab {
      flex: 1;
      padding: 8px 14px;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-muted);
      border-radius: var(--radius-md);
      border: none;
      background: none;
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast);
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .notif-tab.active {
      background: var(--navy);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .notif-tab:hover:not(.active) {
      background: var(--color-surface-2);
      color: var(--color-text-primary);
    }

    /* ── Notification Card ───────────────────────────────── */
    .notif-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    /* ── Notification Item ───────────────────────────────── */
    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      transition: background var(--transition-fast);
      position: relative;
    }

    .notif-item:last-child {
      border-bottom: none;
    }

    .notif-item:hover {
      background: var(--color-surface-2);
    }

    .notif-item.unread {
      background: rgba(11, 10, 50, 0.025);
    }

    .notif-item.unread:hover {
      background: rgba(11, 10, 50, 0.05);
    }

    /* Left accent stripe for unread */
    .notif-item.unread::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 0 2px 2px 0;
    }

    .notif-item.unread.tipo-atividade::before  { background: var(--gold); }
    .notif-item.unread.tipo-prova::before      { background: var(--color-danger); }
    .notif-item.unread.tipo-quiz::before       { background: var(--color-info); }
    .notif-item.unread.tipo-outro::before      { background: var(--color-success); }

    /* Icon bubble */
    .notif-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid var(--color-border);
    }

    .notif-icon.tipo-atividade  { background: rgba(204,164,59,.10); }
    .notif-icon.tipo-prova      { background: rgba(197, 48,48,.08); }
    .notif-icon.tipo-quiz       { background: rgba(43,108,176,.08); }
    .notif-icon.tipo-outro      { background: rgba(39,103,73,.08);  }

    /* Content */
    .notif-content { flex: 1; min-width: 0; }

    .notif-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }

    .notif-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.35;
    }

    .notif-item:not(.unread) .notif-title {
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .notif-time {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .notif-msg {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    /* Unread dot */
    .notif-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--navy);
      flex-shrink: 0;
      margin-top: 5px;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }

    .notif-item.unread .notif-dot { opacity: 1; }

    /* ── Empty State ─────────────────────────────────────── */
    .notif-empty {
      padding: 64px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .notif-empty-icon {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-xl);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 4px;
    }

    .notif-empty h3 {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .notif-empty p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ── Skeleton Loading ────────────────────────────────── */
    .notif-skeleton {
      padding: 18px 20px;
      display: flex;
      gap: 16px;
      border-bottom: 1px solid var(--color-border);
    }

    .notif-skeleton:last-child { border-bottom: none; }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .notif-card   { animation: fadeUp .4s ease both; }
    .notif-topbar { animation: fadeUp .4s .05s ease both; }
    .notif-tabs   { animation: fadeUp .4s .1s ease both; }

    @media (max-width: 600px) {
      .notif-tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <main class="app-main">

    <!-- ── Page Header ── -->
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Notificações</h1>
        <p class="page-subtitle">Avisos, novas atividades e conquistas</p>
      </div>
      <div class="page-header-right">
        <button class="btn btn-secondary btn-sm" id="mark-all-read">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Marcar todas como lidas
        </button>
      </div>
    </header>

    <!-- ── Page Content ── -->
    <div class="page-content">
      <div class="notif-wrapper">

        <!-- Top bar: unread count -->
        <div class="notif-topbar">
          <span class="notif-count-label">
            <span class="notif-unread-badge" id="notif-unread-count">0</span>
            não lidas
          </span>
        </div>

        <!-- Filter tabs -->
        <div class="notif-tabs" role="tablist">
          <button class="notif-tab active" data-filter="todas"  role="tab">Todas</button>
          <button class="notif-tab"        data-filter="atividade" role="tab">📝 Atividades</button>
          <button class="notif-tab"        data-filter="prova"     role="tab">📋 Provas</button>
          <button class="notif-tab"        data-filter="quiz"      role="tab">🎮 Quizzes</button>
        </div>

        <!-- Notification list card -->
        <div class="notif-card">
          <!-- Skeleton loading state -->
          <div id="notif-skeleton">
            <div class="notif-skeleton">
              <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0;"></div>
              <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
                <div class="skeleton skeleton-text medium"></div>
                <div class="skeleton skeleton-text short"></div>
              </div>
            </div>
            <div class="notif-skeleton">
              <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0;"></div>
              <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text medium"></div>
              </div>
            </div>
            <div class="notif-skeleton">
              <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0;"></div>
              <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
                <div class="skeleton skeleton-text short"></div>
                <div class="skeleton skeleton-text"></div>
              </div>
            </div>
          </div>
          <!-- Real content injected by JS -->
          <ul id="notifications-list" style="list-style:none;margin:0;padding:0;display:none;"></ul>
        </div>

      </div>
    </div><!-- /page-content -->
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/aluno/notificacoes.js"></script>
<script src="../js/aluno/push.js"></script>
</body>
</html>
