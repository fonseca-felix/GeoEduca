<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoEduca - Quizzes</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/darkmode.css" />
  <style>
    .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
    .stat-card { background: var(--bg-card, #fff); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border-color, #e2e8f0); display: flex; align-items: center; gap: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #e0e7ff; color: #4361ee; }
    .stat-info h4 { font-size: 0.875rem; color: var(--text-secondary, #64748b); font-weight: 500; margin-bottom: 0.25rem; }
    .stat-info p { font-size: 1.5rem; font-weight: 700; color: var(--text-primary, #1e293b); font-family: 'Space Grotesk', sans-serif; }

    .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .quiz-card { background: var(--bg-card, #fff); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color, #e2e8f0); transition: all 0.3s ease; display: flex; flex-direction: column; }
    .quiz-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); border-color: var(--primary-color, #4361ee); }
    .quiz-banner { height: 120px; background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%); position: relative; display: flex; align-items: center; justify-content: center; color: white; }
    .quiz-banner svg { width: 48px; height: 48px; opacity: 0.8; }
    .quiz-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
    .quiz-category { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary-color, #4361ee); margin-bottom: 0.5rem; }
    .quiz-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--text-primary, #1e293b); }
    .quiz-meta { display: flex; gap: 1rem; font-size: 0.875rem; color: var(--text-secondary, #64748b); margin-bottom: 1.5rem; }
    .meta-item { display: flex; align-items: center; gap: 0.375rem; }
    
    .btn-start { margin-top: auto; width: 100%; padding: 0.75rem; border-radius: 8px; border: none; background: #f1f5f9; color: #0f172a; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
    .btn-start:hover { background: var(--primary-color, #4361ee); color: white; }

    /* Modal Styles */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000; backdrop-filter: blur(4px); }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: var(--bg-card, #fff); width: 100%; max-width: 450px; border-radius: 20px; overflow: hidden; transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .modal-overlay.active .modal-content { transform: scale(1); }
    .modal-header { padding: 1.5rem; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; color: #0f172a; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #64748b; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .modal-close:hover { background: #e2e8f0; color: #0f172a; }
    .modal-body { padding: 1.5rem; }
    .modal-footer { padding: 1.5rem; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; gap: 1rem; }
    .btn-full { flex: 1; padding: 0.75rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
    .btn-cancel { background: white; border: 1px solid #cbd5e1; color: #475569; }
    .btn-cancel:hover { background: #f1f5f9; }
    .btn-confirm { background: var(--primary-color, #4361ee); color: white; }
    .btn-confirm:hover { background: var(--primary-hover, #3a56d4); box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3); }
  </style>
</head>
<body>
<div class="app-layout" id="app-layout">
  <main class="app-main">
    <header class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">Quizzes de Conhecimento</h1>
        <p class="page-subtitle">Teste seus conhecimentos, ganhe pontos e suba no ranking!</p>
      </div>
    </header>
    <div class="page-content">
      
      <div class="stats-container">
        <div class="stat-card">
          <div class="stat-icon">🎯</div>
          <div class="stat-info">
            <h4>Quizzes Concluídos</h4>
            <p id="stat-quizzes-done">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: #dcfce7; color: #10b981;">⭐</div>
          <div class="stat-info">
            <h4>Pontuação em Quizzes</h4>
            <p id="stat-quizzes-points">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: #e0e7ff; color: #4361ee;">📋</div>
          <div class="stat-info">
            <h4>Quizzes Disponíveis</h4>
            <p id="stat-quizzes-pending">0</p>
          </div>
        </div>
      </div>

      <div class="quiz-grid" id="quiz-grid">
        <!-- Quizzes injected via JS -->
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="quiz-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Pronto para começar?</h2>
      <button class="modal-close" onclick="closeModal('quiz-modal')">&times;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- Injected -->
    </div>
    <div class="modal-footer">
      <button class="btn-full btn-cancel" onclick="closeModal('quiz-modal')">Voltar</button>
      <button class="btn-full btn-confirm" id="btn-start-quiz">Iniciar Quiz</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/aluno/quiz.js"></script>
</body>
</html>
